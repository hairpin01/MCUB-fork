<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCUB - Setup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hubballi&family=JetBrains+Mono:wght@300;400;600&display=swap">
<link rel="stylesheet" href="/static/css/setup.css">
</head>
<body data-already-configured="{{ '1' if already_configured else '0' }}" data-show-reauth="{{ '1' if show_reauth else '0' }}">


<div class="blob"></div>
<div class="lights">
  <div class="light x1"></div><div class="light x2"></div><div class="light x3"></div>
  <div class="light x4"></div><div class="light x5"></div><div class="light x6"></div>
  <div class="light x7"></div><div class="light x8"></div><div class="light x9"></div>
</div>
<div id="sky"><div id="shootingstars">
  <div class="wish"></div><div class="wish"></div><div class="wish"></div>
  <div class="wish"></div><div class="wish"></div><div class="wish"></div>
  <div class="wish"></div><div class="wish"></div><div class="wish"></div>
  <div class="wish"></div>
</div></div>


<div class="top-controls">
  <button class="icon-btn" id="langToggle" title="Switch language">EN</button>
  <button class="icon-btn" id="themeToggle" title="Toggle theme">🌙</button>
</div>

<div id="toasts"></div>

<div class="page" id="setupPage">

  <div class="logo-row">
    <img src="/static/img/0.png" alt="MCUB" class="logo-img">
  </div>
  <p class="subtitle" data-i18n="subtitle_setup"></p>

  <div class="steps-bar">
    <div class="step active" id="dot-1"><span class="snum">1</span><span class="slabel" data-i18n="step_credentials"></span></div>
    <div class="sconn"></div>
    <div class="step" id="dot-1qr"><span class="snum">QR</span><span class="slabel" data-i18n="step_scan"></span></div>
    <div class="sconn"></div>
    <div class="step" id="dot-2"><span class="snum">2</span><span class="slabel" data-i18n="step_code"></span></div>
    <div class="sconn"></div>
    <div class="step" id="dot-3"><span class="snum">3</span><span class="slabel">2FA</span></div>
    <div class="sconn"></div>
    <div class="step" id="dot-4"><span class="snum">4</span><span class="slabel" data-i18n="step_bot"></span></div>
    <div class="sconn"></div>
    <div class="step" id="dot-5"><span class="snum">5</span><span class="slabel" data-i18n="step_done"></span></div>
  </div>

  <div class="wizard-card">


    <div class="wstep" id="s1">
      <h2 data-i18n="s1_title"></h2>
      <p class="hint" data-i18n-html="s1_hint"></p>
      <label>
        <span data-i18n="label_api_id"></span>
        <input id="f_api_id" type="text" inputmode="numeric" placeholder="12345678" autocomplete="off">
      </label>
      <label>
        <span data-i18n="label_api_hash"></span>
        <input id="f_api_hash" type="text" placeholder="0123456789abcdef…" autocomplete="off">
      </label>
      <label>
        <span data-i18n="label_phone"></span>
        <input id="f_phone" type="tel" placeholder="+1234567890" autocomplete="tel">
      </label>
      <div class="btn-row">
        <button class="btn-primary" id="btn1" data-action="step1" data-i18n="btn_send_code"></button>
        <button class="btn-ghost" id="btn1_qr" data-action="step1QR" data-i18n="btn_qr_code"></button>
      </div>
    </div>


    <div class="wstep hidden" id="s1qr">
      <h2 data-i18n="s1qr_title"></h2>
      <p class="hint" data-i18n="s1qr_hint"></p>
      <div id="qr-container" class="qr-container">
        <div id="qr-image" class="qr-image-box"></div>
      </div>
      <p class="hint small" id="qr-status" data-i18n="qr_waiting"></p>
      <div class="btn-row">
        <button class="btn-ghost" data-show-step="1" data-i18n="btn_back"></button>
        <button class="btn-primary" id="btn_qr_poll" data-action="pollQR" data-i18n="btn_check_again"></button>
      </div>
    </div>


    <div class="wstep hidden" id="s2">
      <h2 data-i18n="s2_title"></h2>
      <p class="hint" data-i18n="s2_hint"></p>
      <label>
        <span data-i18n="label_code"></span>
        <input id="f_code" type="text" inputmode="numeric" placeholder="12345" autocomplete="one-time-code" maxlength="10">
      </label>
      <div class="btn-row">
        <button class="btn-ghost" data-show-step="1" data-i18n="btn_back_arrow"></button>
        <button class="btn-primary" id="btn2" data-action="step2" data-i18n="btn_verify"></button>
      </div>
    </div>


    <div class="wstep hidden" id="s3">
      <h2 data-i18n="s3_title"></h2>
      <p class="hint" data-i18n="s3_hint"></p>
      <label>
        <span data-i18n="label_cloud_password"></span>
        <input id="f_pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </label>
      <div class="btn-row">
        <button class="btn-ghost" data-show-step="2" data-i18n="btn_back_arrow"></button>
        <button class="btn-primary" id="btn3" data-action="step3" data-i18n="btn_confirm"></button>
      </div>
    </div>


    <div class="wstep hidden" id="s4">
      <h2 data-i18n="s4_title"></h2>
      <p class="hint" data-i18n-html="s4_hint"></p>
      <label>
        <span data-i18n="label_bot_token_skip"></span>
        <input id="f_bot_token" type="text" placeholder="1234567890:ABCdefGHIjklMNOpqrsTUVwxyz">
      </label>
      <button class="btn-primary" id="btn4verify" data-action="verifyBotInSetup" data-i18n="btn_verify_token"></button>
      <button class="btn-ghost" id="btn4auto" data-action="autoCreateBot" data-i18n="btn_auto_create"></button>
      <div class="btn-row">
        <button class="btn-ghost" data-action="skipBot" data-i18n="btn_skip"></button>
        <button class="btn-primary" id="btn4" data-action="finishWithBot" disabled data-i18n="btn_continue"></button>
      </div>
    </div>


    <div class="wstep hidden" id="s5">
      <div class="done-icon"><img src="/static/img/success.png" alt="Success" class="done-icon-img"></div>
      <h2 data-i18n="s5_title"></h2>
      <p class="hint" data-i18n="s5_hint"></p>
      <div class="spinner"></div>
      <p class="hint small" id="poll-status" data-i18n="kernel_waiting"></p>
    </div>

  </div>

  <div class="reset-bar">
    <span data-i18n="reset_configured"></span> <a href="#" class="reset-link" data-action="showResetChoice" data-i18n="reset_link"></a>
  </div>
  <div class="reset-bar reset-bar-secondary">
    <a href="/bot" class="reset-link" data-i18n="bot_settings_link"></a>
  </div>


  <div id="resetModal" class="reset-modal hidden">
    <div class="reset-modal-card">
      <h3 class="reset-modal-title" data-i18n="modal_title"></h3>
      <p class="hint reset-modal-hint" data-i18n="modal_hint"></p>
      <button class="btn-primary" data-reset-choice="qr" data-i18n="modal_qr"></button>
      <div class="btn-row reset-modal-actions">
        <button class="btn-ghost" data-reset-choice="code" data-i18n="modal_code"></button>
        <button class="btn-ghost" data-action="hideResetModal" data-i18n="btn_cancel"></button>
      </div>
    </div>
  </div>

  <footer class="setup-footer" data-i18n="footer"></footer>
</div>

<div class="page hidden" id="configuredPage">
  <div class="logo-row">
    <img src="/static/img/0.png" alt="MCUB" class="logo-img">
  </div>
  <p class="subtitle" data-i18n="configured_subtitle"></p>

  <div class="wizard-card">
    <div class="done-icon"><img src="/static/img/success.png" alt="Success" class="done-icon-img"></div>
    <h2 data-i18n="configured_title"></h2>
    <p class="hint" data-i18n="configured_hint"></p>
  </div>

  <div class="reset-bar">
    <a href="/setup/reset" class="reset-link" data-i18n="reset_fresh"></a>
  </div>
  <footer class="setup-footer" data-i18n="footer"></footer>
</div>

<div class="page hidden" id="reauthPage">
  <div class="logo-row">
    <img src="/static/img/0.png" alt="MCUB" class="logo-img">
  </div>
  <p class="subtitle" data-i18n="subtitle_reauth"></p>

  <div class="wizard-card">
    <h2 data-i18n="reauth_title"></h2>
    <p class="hint" data-i18n="reauth_hint"></p>
    <div class="btn-row reauth-actions">
      <button class="btn-primary" data-action="showReauthQR" data-i18n="btn_qr_code"></button>
      <button class="btn-ghost" data-action="showReauthCode" data-i18n="btn_send_code"></button>
    </div>
  </div>

  <div class="reset-bar">
    <a href="/setup/reset" class="reset-link" data-i18n="reset_fresh"></a>
  </div>
  <footer class="setup-footer" data-i18n="footer"></footer>
</div>


<div class="page hidden" id="botPage">

  <div class="logo-row">
    <img src="/static/img/0.png" alt="MCUB" class="logo-img">
  </div>
  <p class="subtitle" data-i18n="subtitle_bot"></p>

  <div class="wizard-card">
    <div id="botStatus">
      <div class="spinner"></div>
      <p class="hint" data-i18n="loading"></p>
    </div>


    <div id="botForm" class="hidden">
      <h2 data-i18n="bot_form_title"></h2>
      <p class="hint" data-i18n="bot_form_hint"></p>
      <label>
        <span data-i18n="label_bot_token"></span>
        <input id="f_bot_token_page" type="text" placeholder="1234567890:ABCdefGHIjklMNOpqrsTUVwxyz">
      </label>
      <button class="btn-primary" id="btnBotVerify" data-action="verifyBotToken" data-i18n="btn_verify_token"></button>
      <div class="btn-row">
        <button class="btn-ghost" data-action="goHome" data-i18n="btn_back_arrow"></button>
        <button class="btn-primary" id="btnBotSave" data-action="saveBotToken" disabled data-i18n="btn_save_token"></button>
      </div>
    </div>

    <div id="botActions" class="hidden">
      <h2 data-i18n="bot_active_title"></h2>
      <p class="hint" id="botUsernameDisplay"></p>
      <div class="btn-row">
        <button class="btn-ghost" data-action="goHome" data-i18n="btn_back_arrow"></button>
        <button class="btn-primary" id="btnBotStart" data-action="startBot" data-i18n="btn_start_bot"></button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/setup.js"></script>
</body>
</html>
