<svg xmlns="http://www.w3.org/2000/svg" width="563" height="288" viewBox="0 0 563 288" role="img" aria-label="Class-style module code example">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#010409" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="563" height="288" rx="24" fill="#161B22"/>
  <rect x="14" y="14" width="535" height="260" rx="18" fill="#0D1117" stroke="#30363D" filter="url(#shadow)"/>
  <circle cx="38" cy="36" r="6" fill="#FF5F56"/>
  <circle cx="58" cy="36" r="6" fill="#FFBD2E"/>
  <circle cx="78" cy="36" r="6" fill="#27C93F"/>
  <text x="281" y="41" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#C9D1D9">Class-style module</text>
  <g font-family="Hack, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">
  <text x="34" y="58" xml:space="preserve"><tspan fill="#FF7B72">from</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">core</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">lib</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">loader</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">module_base</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">import</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">ModuleBase</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">command</tspan></text>
  <text x="34" y="78" xml:space="preserve"><tspan fill="#E6EDF3"></tspan></text>
  <text x="34" y="98" xml:space="preserve"><tspan fill="#E6EDF3"></tspan></text>
  <text x="34" y="118" xml:space="preserve"><tspan fill="#FF7B72">class</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">Ping</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">ModuleBase</tspan><tspan fill="#FF7B72">)</tspan><tspan fill="#FF7B72">:</tspan></text>
  <text x="34" y="138" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#E6EDF3">name</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#A5D6FF">&quot;Ping&quot;</tspan></text>
  <text x="34" y="158" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#E6EDF3">version</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#A5D6FF">&quot;1.0.0&quot;</tspan></text>
  <text x="34" y="178" xml:space="preserve"><tspan fill="#E6EDF3"></tspan></text>
  <text x="34" y="198" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#FF7B72">@</tspan><tspan fill="#E6EDF3">command</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#A5D6FF">&quot;ping&quot;</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">doc_en</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#A5D6FF">&quot;Check bot latency&quot;</tspan><tspan fill="#FF7B72">)</tspan></text>
  <text x="34" y="218" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#FF7B72">async</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">def</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">cmd_ping</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">self</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">)</tspan><tspan fill="#FF7B72">:</tspan></text>
  <text x="34" y="238" xml:space="preserve"><tspan fill="#E6EDF3">        </tspan><tspan fill="#FF7B72">await</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">edit</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#A5D6FF">&quot;pong&quot;</tspan><tspan fill="#FF7B72">)</tspan></text>
  </g>
