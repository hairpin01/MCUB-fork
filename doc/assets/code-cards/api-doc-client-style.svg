<svg xmlns="http://www.w3.org/2000/svg" width="664" height="148" viewBox="0 0 664 148" role="img" aria-label="Client-style helper code example">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#010409" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="664" height="148" rx="24" fill="#161B22"/>
  <rect x="14" y="14" width="636" height="120" rx="18" fill="#0D1117" stroke="#30363D" filter="url(#shadow)"/>
  <circle cx="38" cy="36" r="6" fill="#FF5F56"/>
  <circle cx="58" cy="36" r="6" fill="#FFBD2E"/>
  <circle cx="78" cy="36" r="6" fill="#27C93F"/>
  <text x="332" y="41" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#C9D1D9">Client-style helper</text>
  <g font-family="Hack, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">
  <text x="34" y="58" xml:space="preserve"><tspan fill="#FF7B72">async</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">def</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">main</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">client</tspan><tspan fill="#FF7B72">)</tspan><tspan fill="#FF7B72">:</tspan></text>
  <text x="34" y="78" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#E6EDF3">me</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">await</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">client</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">get_me</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#FF7B72">)</tspan></text>
  <text x="34" y="98" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#FF7B72">await</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">client</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">send_message</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#A5D6FF">&quot;me&quot;</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">f&quot;</tspan><tspan fill="#E6EDF3">MCUB is online: </tspan><tspan fill="#FF7B72">{</tspan><tspan fill="#E6EDF3">me</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">first_name</tspan><tspan fill="#FF7B72">}</tspan><tspan fill="#E6EDF3">&quot;</tspan><tspan fill="#FF7B72">)</tspan></text>
  </g>
