  <rect width="614" height="148" rx="24" fill="#161B22"/>
  <rect x="14" y="14" width="586" height="120" rx="18" fill="#0D1117" stroke="#30363D" filter="url(#shadow)"/>
  <circle cx="38" cy="36" r="6" fill="#FF5F56"/>
  <circle cx="58" cy="36" r="6" fill="#FFBD2E"/>
  <circle cx="78" cy="36" r="6" fill="#27C93F"/>
  <text x="307" y="41" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#C9D1D9">Command registration</text>
  <g font-family="Hack, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">
  <text x="34" y="58" xml:space="preserve"><tspan fill="#FF7B72">@</tspan><tspan fill="#E6EDF3">kernel</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">register</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">command</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#A5D6FF">&quot;example&quot;</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">alias</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#FF7B72">[</tspan><tspan fill="#A5D6FF">&quot;ex&quot;</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#A5D6FF">&quot;e&quot;</tspan><tspan fill="#FF7B72">]</tspan><tspan fill="#FF7B72">)</tspan></text>
  <text x="34" y="78" xml:space="preserve"><tspan fill="#FF7B72">async</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">def</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">example_handler</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">)</tspan><tspan fill="#FF7B72">:</tspan></text>
  <text x="34" y="98" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#FF7B72">await</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">edit</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">f&quot;</tspan><tspan fill="#E6EDF3">Works with </tspan><tspan fill="#FF7B72">{</tspan><tspan fill="#E6EDF3">kernel</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">custom_prefix</tspan><tspan fill="#FF7B72">}</tspan><tspan fill="#E6EDF3">example</tspan><tspan fill="#E6EDF3">&quot;</tspan><tspan fill="#FF7B72">)</tspan></text>
  </g>
