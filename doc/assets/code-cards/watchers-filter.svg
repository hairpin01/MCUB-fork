<svg xmlns="http://www.w3.org/2000/svg" width="597" height="148" viewBox="0 0 597 148" role="img" aria-label="Message watcher code example">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#010409" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="597" height="148" rx="24" fill="#161B22"/>
  <rect x="14" y="14" width="569" height="120" rx="18" fill="#0D1117" stroke="#30363D" filter="url(#shadow)"/>
  <circle cx="38" cy="36" r="6" fill="#FF5F56"/>
  <circle cx="58" cy="36" r="6" fill="#FFBD2E"/>
  <circle cx="78" cy="36" r="6" fill="#27C93F"/>
  <text x="298" y="41" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#C9D1D9">Message watcher</text>
  <g font-family="Hack, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">
  <text x="34" y="58" xml:space="preserve"><tspan fill="#FF7B72">@</tspan><tspan fill="#E6EDF3">kernel</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">register</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">watcher</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">out</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#FF7B72">True</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">only_pm</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#FF7B72">True</tspan><tspan fill="#FF7B72">,</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">no_media</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#FF7B72">True</tspan><tspan fill="#FF7B72">)</tspan></text>
  <text x="34" y="78" xml:space="preserve"><tspan fill="#FF7B72">async</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#FF7B72">def</tspan><tspan fill="#E6EDF3"> </tspan><tspan fill="#E6EDF3">pm_watcher</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">)</tspan><tspan fill="#FF7B72">:</tspan></text>
  <text x="34" y="98" xml:space="preserve"><tspan fill="#E6EDF3">    </tspan><tspan fill="#E6EDF3">kernel</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">logger</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">info</tspan><tspan fill="#FF7B72">(</tspan><tspan fill="#E6EDF3">f&quot;</tspan><tspan fill="#E6EDF3">sent in PM: </tspan><tspan fill="#FF7B72">{</tspan><tspan fill="#E6EDF3">event</tspan><tspan fill="#FF7B72">.</tspan><tspan fill="#E6EDF3">text</tspan><tspan fill="#FF7B72">}</tspan><tspan fill="#E6EDF3">&quot;</tspan><tspan fill="#FF7B72">)</tspan></text>
  </g>
</svg>
